# Git hooks managed by lefthook — https://lefthook.dev
# Installed automatically via the root `prepare` script (`lefthook install`).
#
# Strategy (ADR 0020): commit *tidies*, it never *verifies*. Pre-commit runs only
# deterministic, non-blocking auto-fixers on the staged files (Prettier) plus a
# staged secret scan. Everything fail-able — ESLint, typecheck, tests,
# boundaries, deps — runs once at the end of a task via `pnpm quality-gate`, and
# again in CI as the hard backstop. This keeps commits sub-second and stops an
# agent round-tripping on a hook that can block.

# format (Prettier, writes working tree) and gitleaks (reads the staged index)
# are independent — formatting can't add or hide a secret — so they run in
# parallel.
pre-commit:
  parallel: true
  commands:
    # Format only the staged files; Prettier resolves each file's config from the
    # owning package's `package.json` "prettier" key. Deterministic, cannot fail
    # meaningfully, re-stages what it rewrote.
    format:
      glob: "*.{js,jsx,ts,tsx,cjs,mjs,json,jsonc,md,mdx,yml,yaml,css}"
      run: pnpm exec prettier --write --ignore-unknown {staged_files}
      stage_fixed: true
    # Secrets must never enter history — the one gate that stays on commit.
    gitleaks:
      run: |
        if command -v gitleaks >/dev/null 2>&1; then
          gitleaks protect --staged --redact --config .gitleaks.toml
        else
          echo "⚠️  gitleaks not installed locally — skipping (enforced in CI)."
          echo "    Install with: brew install gitleaks"
        fi
